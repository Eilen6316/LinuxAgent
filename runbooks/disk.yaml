id: disk.full
title: Investigate disk usage
triggers: [disk, full, space, 磁盘, 空间]
scenarios:
  - 机器磁盘满了，帮我看看哪里占空间
  - disk full on this host
  - find large directories
steps:
  - command: df -h
    purpose: Show filesystem usage
    read_only: true
  - command: du -sh /var/log
    purpose: Estimate log directory usage
    read_only: true
preflight_checks: [df -h]
verification_commands: [df -h]
rollback_commands: []
