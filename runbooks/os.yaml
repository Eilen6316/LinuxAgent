id: system.os
title: Inspect operating system version
steps:
  - command: cat /etc/os-release
    purpose: Show Linux distribution metadata
    read_only: true
  - command: uname -a
    purpose: Show kernel and machine information
    read_only: true
preflight_checks: [cat /etc/os-release]
verification_commands: [uname -a]
rollback_commands: []
