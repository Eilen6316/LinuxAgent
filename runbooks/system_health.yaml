id: system.health
title: Inspect overall system health
title_i18n:
  zh-CN: 检查整体系统健康状态
steps:
  - command: uptime
    purpose: Show uptime and load averages
    purpose_i18n:
      zh-CN: 显示运行时间和负载均值
    read_only: true
  - command: free -h
    purpose: Show memory usage
    purpose_i18n:
      zh-CN: 显示内存使用情况
    read_only: true
  - command: df -h
    purpose: Show filesystem usage
    purpose_i18n:
      zh-CN: 显示文件系统使用情况
    read_only: true
  - command: systemctl --failed --no-pager
    purpose: List failed systemd units without paging
    purpose_i18n:
      zh-CN: 不分页列出失败的 systemd unit
    read_only: true
preflight_checks: [uptime]
verification_commands: [uptime, free -h, df -h]
rollback_commands: []
