id: system.health
title: Inspect overall system health
steps:
  - command: uptime
    purpose: Show uptime and load averages
    read_only: true
  - command: free -h
    purpose: Show memory usage
    read_only: true
  - command: df -h
    purpose: Show filesystem usage
    read_only: true
  - command: systemctl --failed --no-pager
    purpose: List failed systemd units without paging
    read_only: true
preflight_checks: [uptime]
verification_commands: [uptime, free -h, df -h]
rollback_commands: []
