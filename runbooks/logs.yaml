id: logs.errors
title: Inspect recent log errors
title_i18n:
  zh-CN: 检查最近的错误日志
steps:
  - command: journalctl -p err --no-pager -n 100
    purpose: Show recent error-level journal entries
    purpose_i18n:
      zh-CN: 显示最近 error 级别的 journal 记录
    read_only: true
preflight_checks: [journalctl -p err --no-pager -n 20]
verification_commands: [journalctl -p err --no-pager -n 20]
rollback_commands: []
