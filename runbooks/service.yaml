id: service.status
title: Check SSH service health
steps:
  - command: systemctl status ssh --no-pager
    purpose: Show SSH service status without paging
    read_only: true
  - command: journalctl -u ssh --no-pager -n 100
    purpose: Show recent SSH service logs
    read_only: true
preflight_checks: [systemctl status ssh --no-pager]
verification_commands: [systemctl is-active ssh]
rollback_commands: []
