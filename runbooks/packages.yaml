id: package.inventory
title: List installed packages
steps:
  - command: rpm -qa --last
    purpose: List installed RPM packages with install time when available
    read_only: true
  - command: dnf list installed
    purpose: List packages known to DNF on RPM-based systems
    read_only: true
preflight_checks: [rpm -qa --last]
verification_commands: [rpm -qa --last]
rollback_commands: []
