scenario: "workspace search skips symlink and continues"
provider_responses:
  - tool_calls:
      - tool: search_files
        args:
          root: "{tmp}/allowed"
          pattern: "执行时间"
    response: |
      {"plan_type":"file_patch","goal":"add runtime timestamps after search inspection","request_intent":"update","files_changed":["{tmp}/allowed/disk_info.sh"],"unified_diff":"--- {tmp}/allowed/disk_info.sh\n+++ {tmp}/allowed/disk_info.sh\n@@ -1,2 +1,5 @@\n #!/bin/bash\n+START_TIME=$(date '+%Y-%m-%d %H:%M:%S')\n echo \"disk\"\n+END_TIME=$(date '+%Y-%m-%d %H:%M:%S')\n+echo \"Script End Time: $END_TIME\"\n","risk_summary":"Updates an existing script after search inspection.","verification_commands":["bash -n {tmp}/allowed/disk_info.sh"],"permission_changes":[],"rollback_diff":"","expected_side_effects":["filesystem.write"]}
  - "script updated"
setup:
  workspace_tools: true
  file_patch:
    allow_roots:
      - "{tmp}/allowed"
    high_risk_roots: []
  files:
    - path: "{tmp}/outside/secret.txt"
      content: "执行时间 secret\n"
    - path: "{tmp}/allowed/disk_info.sh"
      content: |
        #!/bin/bash
        echo "disk"
  symlinks:
    - path: "{tmp}/allowed/link.txt"
      target: "{tmp}/outside/secret.txt"
inputs:
  - role: human
    content: "给 {tmp}/allowed/disk_info.sh 增加执行时间和执行结束时间"
expected_interrupts:
  - type: confirm_file_patch
resume:
  decision: "yes"
  latency_ms: 25
expected:
  command_executed: true
  exit_code: 0
  response_contains:
    - "script updated"
  tool_events:
    - tool_name: search_files
      status: allowed
      args:
        root: "{tmp}/allowed"
        pattern: "执行时间"
  files:
    - path: "{tmp}/allowed/disk_info.sh"
      content: |
        #!/bin/bash
        START_TIME=$(date '+%Y-%m-%d %H:%M:%S')
        echo "disk"
        END_TIME=$(date '+%Y-%m-%d %H:%M:%S')
        echo "Script End Time: $END_TIME"
