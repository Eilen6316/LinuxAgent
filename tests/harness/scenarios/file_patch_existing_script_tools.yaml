scenario: "file patch updates existing script after workspace inspection"
provider_responses:
  - tool_calls:
      - tool: list_dir
        args:
          path: "{tmp}"
      - tool: read_file
        args:
          path: "{tmp}/disk_info.sh"
    response: |
      {"plan_type":"file_patch","goal":"add execution start and end timestamps to existing disk info script","request_intent":"update","files_changed":["{tmp}/disk_info.sh"],"unified_diff":"--- {tmp}/disk_info.sh\n+++ {tmp}/disk_info.sh\n@@ -1,2 +1,6 @@\n #!/bin/bash\n+start_time=\"$(date '+%Y-%m-%d %H:%M:%S')\"\n+echo \"Execution start time: $start_time\"\n echo \"disk\"\n+end_time=\"$(date '+%Y-%m-%d %H:%M:%S')\"\n+echo \"Execution end time: $end_time\"\n","risk_summary":"Updates an existing script after reading current content.","verification_commands":["bash -n {tmp}/disk_info.sh"],"permission_changes":[],"rollback_diff":"","expected_side_effects":["filesystem.write"]}
  - "script updated after inspecting the existing file"
setup:
  workspace_tools: true
  file_patch:
    allow_roots:
      - "{tmp}"
    high_risk_roots: []
  files:
    - path: "{tmp}/disk_info.sh"
      content: |
        #!/bin/bash
        echo "disk"
inputs:
  - role: human
    content: "在 /tmp/disk_info.sh 里面再加一个列出执行时间和执行结束时间的功能"
expected_interrupts:
  - type: confirm_file_patch
resume:
  decision: "yes"
  latency_ms: 25
expected:
  command_executed: true
  exit_code: 0
  response_contains:
    - "script updated after inspecting the existing file"
  tool_events:
    - tool_name: list_dir
      status: allowed
      args:
        path: "{tmp}"
    - tool_name: read_file
      status: allowed
      args:
        path: "{tmp}/disk_info.sh"
  files:
    - path: "{tmp}/disk_info.sh"
      content: |
        #!/bin/bash
        start_time="$(date '+%Y-%m-%d %H:%M:%S')"
        echo "Execution start time: $start_time"
        echo "disk"
        end_time="$(date '+%Y-%m-%d %H:%M:%S')"
        echo "Execution end time: $end_time"
