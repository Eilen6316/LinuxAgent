scenario: "cluster uptime command"
provider_responses:
  - '{"goal":"cluster uptime","commands":[{"command":"uptime","purpose":"check uptime","read_only":true,"target_hosts":["*"]}],"risk_summary":"read-only batch","preflight_checks":[],"verification_commands":[],"rollback_commands":[],"requires_root":false,"expected_side_effects":[]}'
  - "集群运行正常"
setup:
  cluster_hosts:
    - name: host-a
      remote_profile:
        name: ops-readonly
        remote_cwd: /srv/app
        environment: clean
        allow_sudo: false
        sudo_allowlist: []
    - name: host-b
      remote_profile:
        name: ops-readonly
        remote_cwd: /srv/app
        environment: clean
        allow_sudo: false
        sudo_allowlist: []
inputs:
  - role: human
    content: "run uptime on all hosts"
expected_interrupts:
  - type: confirm_command
    matched_rule: BATCH_CONFIRM
    batch_hosts:
      - host-a
      - host-b
    remote_profiles:
      - host: host-a
        hostname: host-a.invalid
        port: 22
        username: ops
        profile: ops-readonly
        remote_cwd: /srv/app
        environment: clean
        allow_sudo: false
        sudo_allowlist: []
      - host: host-b
        hostname: host-b.invalid
        port: 22
        username: ops
        profile: ops-readonly
        remote_cwd: /srv/app
        environment: clean
        allow_sudo: false
        sudo_allowlist: []
resume:
  decision: "yes"
  latency_ms: 90
expected:
  command_executed: true
  exit_code: 0
  response_contains:
    - "集群"
