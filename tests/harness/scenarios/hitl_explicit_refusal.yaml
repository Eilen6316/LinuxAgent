scenario: "explicit user refusal blocks execution"
provider_responses:
  - '{"goal":"inspect a path","commands":[{"command":"/bin/echo refuse-me","purpose":"show a path","read_only":true,"target_hosts":[]}],"risk_summary":"read-only","preflight_checks":[],"verification_commands":[],"rollback_commands":[],"requires_root":false,"expected_side_effects":[]}'
inputs:
  - role: human
    content: "echo a path for me"
expected_interrupts:
  - type: confirm_command
    safety_level: CONFIRM
    command_source: llm
    matched_rule: LLM_FIRST_RUN
resume:
  decision: "no"
  latency_ms: 800
expected:
  command_executed: false
  response_contains:
    - "/bin/echo refuse-me"
  audit_log_contains:
    - event: confirm_begin
      command_source: llm
    - event: confirm_decision
      decision: "no"
