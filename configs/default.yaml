# LinuxAgent v4 default configuration — packaged defaults.
# DO NOT put real secrets here. User overrides live in ./config.yaml (gitignored, chmod 600).

api:
  provider: deepseek          # openai | openai_compatible | local | ollama | vllm | lmstudio | deepseek | glm | qwen | kimi | minimax | gemini | hunyuan | anthropic | anthropic_compatible | xiaomi_mimo
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  api_key: ""                 # MUST be set in user ./config.yaml
  timeout: 30.0
  stream_timeout: 60.0
  max_retries: 3
  temperature: 0.3
  max_tokens: 2048
  token_parameter: max_completion_tokens  # max_completion_tokens | max_tokens

security:
  command_timeout: 30.0
  max_command_length: 2048
  output_bytes: 65536              # total stdout+stderr capture budget for command context/UI
  session_whitelist_enabled: true

policy:
  path:                         # optional user policy YAML path
  include_builtin: true          # true = built-ins + user overrides; false = user rules only

command_plan:
  max_repair_attempts: 2         # 0 disables automatic failed-command replanning

file_patch:
  allow_roots:
    - .
    - /tmp
  high_risk_roots:
    - /etc
    - /root/.ssh
    - /home/*/.ssh
  allow_permission_changes: true
  max_repair_attempts: 2

sandbox:
  enabled: false
  runner: noop                 # noop | local | bubblewrap
  default_profile: system_inspect
  allowed_roots:
    - .
    - /tmp
  temp_dir: /tmp/linuxagent-sandbox
  network: inherit
  network_allowlist: []
  limits:
    cpu_seconds:
    memory_mb:
    process_count:
    output_bytes:
  tools:
    max_rounds: 3
    timeout_seconds: 5.0
    max_output_chars: 20000
    max_total_output_chars: 60000
    max_file_bytes: 1048576
    max_matches: 200

cluster:
  batch_confirm_threshold: 2
  timeout: 60.0
  known_hosts_path: ~/.ssh/known_hosts
  hosts: []

audit:
  path: ~/.linuxagent/audit.log

ui:
  theme: auto
  max_chat_history: 20
  history_path: ~/.linuxagent/history.json
  checkpoint_path: ~/.linuxagent/checkpoints.json
  prompt_symbol: "❯"

logging:
  level: INFO
  format: console

monitoring:
  enabled: true
  interval_seconds: 30.0
  cpu_threshold: 90.0
  memory_threshold: 90.0
  disk_threshold: 90.0

telemetry:
  enabled: true
  exporter: local
  path: ~/.linuxagent/telemetry.jsonl
  otlp_endpoint:

analytics:
  enabled: false
  data_path: ~/.linuxagent/analytics.json

log_analysis:
  enabled: true
  default_log_paths:
    - /var/log/syslog
    - /var/log/messages
  max_lines: 10000

intelligence:
  enabled: true
  tools_enabled:
  context_window: 50
  embedding_model: text-embedding-3-small
  embedding_cache_dir: ~/.cache/linuxagent/embeddings
  default_command_candidates:
    - ls -la
    - df -h
    - du -sh /var/log
    - systemctl status ssh
    - journalctl -u ssh --no-pager -n 100
