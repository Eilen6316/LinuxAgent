# LinuxAgent v4 example configuration.
#
# Copy this file to ./config.yaml (in the repo root) and `chmod 600 config.yaml`
# before running LinuxAgent. The loader REJECTS any user-supplied config file
# whose permissions are not 0600 or whose owner differs from the invoking user
# (R-SEC-04).
#
# Bootstrap helper: `./scripts/bootstrap.sh` does the copy + chmod for you.
#
# Load priority (highest wins; same keys deep-merge):
#   1. --config <path>                        (CLI flag)
#   2. LINUXAGENT_CONFIG                      (env var, path only)
#   3. ./config.yaml                          (cwd)
#   4. ~/.config/linuxagent/config.yaml       (XDG)
#   5. configs/default.yaml                   (packaged, lowest)

api:
  # Provider: openai | openai_compatible | deepseek | glm | qwen | kimi | minimax | gemini | hunyuan | anthropic | anthropic_compatible | xiaomi_mimo
  # Use *_compatible providers for API relays or third-party compatible endpoints.
  provider: deepseek
  # OpenAI-compatible endpoints include DeepSeek, Together, local Ollama, etc.
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  # Put the real key here (SecretStr — never printed in repr/logs).
  api_key: "sk-REPLACE-ME"
  timeout: 30.0
  stream_timeout: 60.0
  max_retries: 3
  temperature: 0.3
  max_tokens: 2048
  # Token limit parameter name. Some API relays and older OpenAI-compatible
  # backends require max_tokens; newer OpenAI models use max_completion_tokens.
  token_parameter: max_completion_tokens

  # Example API relay configuration:
  # provider: openai_compatible
  # base_url: https://relay.example.com/v1
  # model: gpt-4o-mini
  # api_key: "sk-REPLACE-ME"
  # token_parameter: max_tokens

  # Example Anthropic-compatible relay configuration:
  # provider: anthropic_compatible
  # base_url: https://anthropic-relay.example.com
  # model: claude-3-5-sonnet-latest
  # api_key: "sk-ant-REPLACE-ME"

  # Provider shortcuts using OpenAI-compatible protocols:
  # GLM/Zhipu:       provider: glm      base_url: https://open.bigmodel.cn/api/paas/v4
  # Qwen/DashScope:  provider: qwen     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  # Kimi/Moonshot:   provider: kimi     base_url: https://api.moonshot.ai/v1
  # MiniMax:         provider: minimax  base_url: https://api.minimax.io/v1
  # Gemini:          provider: gemini   base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  # Hunyuan/Tencent: provider: hunyuan  base_url: https://api.hunyuan.cloud.tencent.com/v1
  # Xiaomi MiMo uses Anthropic-compatible protocol:
  # provider: xiaomi_mimo
  # base_url: https://mimo-relay.example.com

security:
  command_timeout: 30.0
  max_command_length: 2048
  # Conversation permissions let you approve LLM-generated SAFE commands for
  # the current conversation thread and the same thread after /resume.
  # Destructive commands (R-HITL-03) are NEVER whitelisted, regardless of this flag.
  session_whitelist_enabled: true

policy:
  # Optional path to a user policy YAML file. See configs/policy.default.yaml
  # for the schema. Duplicate rule IDs override built-in rules; new IDs append.
  path:
  # Keep built-ins by default. Set false only when intentionally replacing the
  # full policy set with user rules.
  include_builtin: true

command_plan:
  # Maximum number of automatic replanning rounds after a command plan fails.
  # Set to 0 to disable failed-command repair fallback.
  max_repair_attempts: 2

file_patch:
  # FilePatchPlan can only write below these roots. Relative paths resolve from
  # the current working directory when LinuxAgent starts.
  allow_roots:
    - .
    - /tmp
  # If a path is both allowed and high-risk, LinuxAgent shows a red elevated
  # confirmation instead of a normal yellow confirmation.
  high_risk_roots:
    - /etc
    - /root/.ssh
    - /home/*/.ssh
  # Permission changes are applied by Python after confirmation, never by shell.
  allow_permission_changes: true
  # Maximum number of automatic FilePatchPlan repair rounds before stopping.
  # Set to 0 to disable patch repair fallback.
  max_repair_attempts: 2

sandbox:
  # The default no-op runner records metadata only; it does not isolate
  # commands. Use runner: local for process lifecycle controls, or
  # runner: bubblewrap when bwrap is installed and the requested profile can be
  # enforced.
  enabled: false
  runner: noop                 # noop | local | bubblewrap
  default_profile: system_inspect  # none | read_only | system_inspect | workspace_write | privileged_passthrough
  allowed_roots:
    - .
    - /tmp
  temp_dir: /tmp/linuxagent-sandbox
  network: inherit                # inherit | disabled | loopback_only | allowlist
  network_allowlist: []
  limits:
    cpu_seconds:
    memory_mb:
    process_count:
    output_bytes:
  tools:
    max_rounds: 3
    timeout_seconds: 5.0
    max_output_chars: 20000
    max_total_output_chars: 60000
    max_file_bytes: 1048576
    max_matches: 200

cluster:
  # Any command sent to >= this many hosts triggers R-HITL-02 batch confirm.
  # The default of 2 catches even a tiny dev+prod pair by design.
  batch_confirm_threshold: 2
  timeout: 60.0
  known_hosts_path: ~/.ssh/known_hosts
  hosts: []
  # Example:
  # hosts:
  #   - name: web-prod-1
  #     hostname: 192.0.2.11
  #     port: 22
  #     username: ops
  #     key_filename: ~/.ssh/id_ed25519
  #     remote_profile:
  #       name: ops-readonly
  #       remote_cwd: /srv/app
  #       environment: clean        # inherit | clean
  #       allow_sudo: false
  #       sudo_allowlist: []        # allow_sudo=true requires explicit commands

audit:
  # Audit log cannot be disabled (R-HITL-06). Path can change, presence cannot.
  # File is hash-chained and created 0o600 on first write.
  path: ~/.linuxagent/audit.log

telemetry:
  # Default is local JSONL spans. No external collector is required.
  # Set exporter: none to disable telemetry writes.
  enabled: true
  exporter: local              # local | none | otlp
  path: ~/.linuxagent/telemetry.jsonl
  otlp_endpoint:

ui:
  theme: auto                  # auto | light | dark
  max_chat_history: 20
  history_path: ~/.linuxagent/history.json
  checkpoint_path: ~/.linuxagent/checkpoints.json
  prompt_symbol: "❯"

logging:
  level: INFO                  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: console              # console | json

monitoring:
  enabled: true
  interval_seconds: 30.0
  cpu_threshold: 90.0
  memory_threshold: 90.0
  disk_threshold: 90.0

analytics:
  enabled: false
  data_path: ~/.linuxagent/analytics.json

log_analysis:
  enabled: true
  default_log_paths:
    - /var/log/syslog
    - /var/log/messages
  max_lines: 10000

intelligence:
  enabled: true
  # Null keeps provider-specific default behavior: OpenAI-compatible providers
  # can expose intelligence tools, while non-embedding defaults can skip them.
  tools_enabled:
  context_window: 50
  # Embedding model used for semantic command/log search.
  # MUST be an API-hosted model — local pytorch models are banned.
  embedding_model: text-embedding-3-small
  embedding_cache_dir: ~/.cache/linuxagent/embeddings
  # Seed candidates used only before learner memory has successful commands.
  default_command_candidates:
    - ls -la
    - df -h
    - du -sh /var/log
    - systemctl status ssh
    - journalctl -u ssh --no-pager -n 100
