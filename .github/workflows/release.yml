name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/linuxagent/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run release quality gates
        run: |
          make release-check
          make lint
          make type
          make security
          make test
          make sandbox
          make integration
          make red-team
          make harness
      - name: Verify build artifacts
        run: make verify-build
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            dist/*.whl
            dist/*.tar.gz
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
